name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run lint
      run: npm run lint

    - name: Run build
      run: npm run build
      env:
        DATABASE_URL: "mysql://root:password@localhost:3306/matchpet" # Dummy URL for build

    - name: Run tests
      run: npm test -- --runInBand
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
